services:
  speckle-server:
    image: speckle/speckle-server:2.19.5
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      CANONICAL_URL: "http://localhost:3000"
      SESSION_SECRET: "localdevsecret1234567890"
      STRATEGY_LOCAL: "true"
      POSTGRES_URL: "postgres://speckle:speckle@postgres/speckle"
      REDIS_URL: "redis://redis"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "speckle-server"
      S3_CREATE_BUCKET: "true"
      DISABLE_FILE_UPLOADS: "false"
      EMAIL: "false"
    depends_on:
      - postgres
      - redis
      - minio

  speckle-frontend:
    image: speckle/speckle-frontend-2:2.19.5
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NUXT_PUBLIC_SERVER_NAME: "Local Speckle"
      NUXT_PUBLIC_API_ORIGIN: "http://localhost:3000"

  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: speckle
      POSTGRES_USER: speckle
      POSTGRES_PASSWORD: speckle
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
